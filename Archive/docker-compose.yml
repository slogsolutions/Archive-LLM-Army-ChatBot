version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: archive_postgres
    environment:
      POSTGRES_USER: archive_admin
      POSTGRES_PASSWORD: StrongPass123
      POSTGRES_DB: archive_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: archive_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: archive_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: StrongMinio123
    ports:
      - "9000:9000"
      - "9001:9001"

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: archive_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"